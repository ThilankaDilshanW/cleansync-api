name: Deploy API to Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Container to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # IMPORTANT: Replace 'your-hf-username' with your actual Hugging Face username in the two spots below!
        run: git push --force https://ThilankaD:$HF_TOKEN@huggingface.co/spaces/Dilshan415/cleansync-api main